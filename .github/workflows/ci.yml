name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================
  # Job 1: PHP Test Suite (MySQL — sama seperti lokal & production)
  # ============================================================
  test:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: devora_test
          MYSQL_USER: devora_user
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: secret_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, zip, exif, bcmath, gd, pcntl
          coverage: none

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Set test DB credentials
        run: |
          sed -i 's/DB_DATABASE=devora/DB_DATABASE=devora_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=devora_user/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=secret/' .env

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-ansi

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test --parallel

  # ============================================================
  # Job 2: Code Style (Laravel Pint)
  # ============================================================
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-ansi

      - name: Run Pint (code style check)
        run: ./vendor/bin/pint --test

  # ============================================================
  # Job 3: Frontend Build Validation
  # ============================================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1
