; ==============================================================
; PHP Custom Config untuk DevoraV2 Production
; ==============================================================

[PHP]
; Performance
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 300

; Upload (untuk import Excel)
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; Error handling (matikan di production)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; String
default_charset = "UTF-8"

; Timezone
date.timezone = "Asia/Jakarta"

; OPcache (wajib aktif di production)
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0   ; 0 = tidak re-check file (lebih cepat, restart container untuk reload)
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; Session
[session]
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.use_strict_mode = 1
